<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>一期一绘学生管理系统</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <h1><span class="brand-title">一期一绘</span><span class="system-title">学生管理系统</span></h1>
      <div class="topbar-actions">
        <button id="top-list-btn" type="button" class="secondary icon-btn"><span class="icon" aria-hidden="true">👥</span>学生列表</button>
        <button id="top-master-timetable-btn" type="button" class="secondary icon-btn"><span class="icon" aria-hidden="true">🗓️</span>全局课表</button>
        <button id="top-create-btn" type="button" class="secondary icon-btn"><span class="icon" aria-hidden="true">⊕</span>录入学生</button>
        <button id="top-logout-btn" type="button" class="secondary icon-btn"><span class="icon" aria-hidden="true">↩</span>退出登录</button>
      </div>
    </header>

    <main class="container">
      <section id="login-page" class="page">
        <div class="login-card">
          <h2>管理员登录</h2>
          <form id="login-form" class="login-form">
            <label>账号
              <input id="login-username" name="username" autocomplete="username" required />
            </label>
            <label>密码
              <input id="login-password" name="password" type="password" autocomplete="current-password" required />
            </label>
            <p id="login-error" class="error"></p>
            <button type="submit">登录</button>
          </form>
        </div>
      </section>

      <section id="list-page" class="page">
        <div class="page-header">
          <h2>学生列表</h2>
          <div class="actions">
            <input id="search-input" type="search" placeholder="搜索姓名或课程种类..." />
          </div>
        </div>

        <div id="student-list" class="student-list"></div>
      </section>


      <section id="master-timetable-page" class="page">
        <div class="page-header">
          <h2>全局课表</h2>
          <div class="week-nav" aria-label="课表周导航">
            <button id="master-prev-week-btn" type="button" class="secondary">上一周</button>
            <button id="master-today-btn" type="button" class="secondary">今天</button>
            <button id="master-next-week-btn" type="button" class="secondary">下一周</button>
            <span id="master-week-range" class="week-range"></span>
          </div>
        </div>
        <div id="master-timetable" class="master-timetable-grid"></div>
      </section>

      <section id="detail-page" class="page">
        <div class="detail-toolbar">
          <button id="back-btn" class="link-btn" type="button">← 返回列表</button>
          <button id="top-delete-btn" class="text-danger-btn" type="button">
            <span class="icon delete-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 6h18" />
                <path d="M8 6V4h8v2" />
                <path d="M19 6l-1 14H6L5 6" />
                <path d="M10 10v6" />
                <path d="M14 10v6" />
              </svg>
            </span>
            删除学生
          </button>
        </div>

        <article class="card" id="student-detail-card"></article>

        <section class="card">
          <h3>签到记录</h3>
          <table>
            <thead>
              <tr>
                <th>日期</th>
                <th>时间</th>
                <th>课程内容</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="attendance-tbody"></tbody>
          </table>
        </section>
      </section>
    </main>

    <dialog id="student-dialog">
      <form method="dialog" id="student-form">
        <h3>录入学生</h3>
        <label>姓名
          <input id="name" name="name" required maxlength="30" />
          <small class="error" data-error-for="name"></small>
        </label>
        <label>性别
          <select id="gender" name="gender" required>
            <option value="">请选择</option>
            <option value="male">男</option>
            <option value="female">女</option>
            <option value="other">其他</option>
          </select>
          <small class="error" data-error-for="gender"></small>
        </label>
        <label>年龄
          <input id="age" name="age" type="number" min="1" max="120" required />
          <small class="error" data-error-for="age"></small>
        </label>
        <label>课程种类
          <select id="course_type" name="course_type" required>
            <option value="创想课" selected>创想课</option>
            <option value="大师课">大师课</option>
            <option value="__add_new__">+ 添加新课程种类</option>
          </select>
          <div class="inline-row hidden" id="new-course-type-row">
            <input id="new-course-type" maxlength="50" placeholder="添加新的课程种类" />
            <button type="button" id="add-course-type-btn" class="secondary">添加</button>
          </div>
          <small class="error" data-error-for="course_type"></small>
        </label>
        <label>报课总数
          <input id="enroll_count" name="enroll_count" type="number" min="1" max="1000" required />
          <small class="error" data-error-for="enroll_count"></small>
        </label>
        <label>总金额
          <input id="total_amount" name="total_amount" type="number" min="0" max="9999999" step="0.01" required />
          <small class="error" data-error-for="total_amount"></small>
        </label>

        <div class="schedule-fieldset">
          <div class="schedule-fieldset-header">
            <span>上课时间</span>
            <button type="button" id="add-schedule-btn" class="secondary">+ 添加时段</button>
          </div>
          <div id="schedule-list" class="schedule-list"></div>
          <small class="error" data-error-for="schedules"></small>
        </div>

        <p id="student-form-server-error" class="error"></p>
        <menu>
          <button type="button" id="cancel-student-btn" class="secondary">取消</button>
          <button type="submit">保存</button>
        </menu>
      </form>
    </dialog>

    <dialog id="checkin-dialog">
      <form method="dialog" id="checkin-form">
        <h3>上课签到</h3>
        <input type="hidden" id="checkin-student-id" />
        <label>上课日期
          <input id="checkin-date" name="date" type="date" required />
          <small class="error" data-error-for="date"></small>
        </label>
        <label>上课时间
          <div class="time-select-group">
            <select id="checkin-hour" aria-label="签到小时">
              <option value="00">00</option>
              <option value="01">01</option>
              <option value="02">02</option>
              <option value="03">03</option>
              <option value="04">04</option>
              <option value="05">05</option>
              <option value="06">06</option>
              <option value="07">07</option>
              <option value="08">08</option>
              <option value="09">09</option>
              <option value="10">10</option>
              <option value="11">11</option>
              <option value="12">12</option>
              <option value="13">13</option>
              <option value="14">14</option>
              <option value="15">15</option>
              <option value="16">16</option>
              <option value="17">17</option>
              <option value="18">18</option>
              <option value="19">19</option>
              <option value="20">20</option>
              <option value="21">21</option>
              <option value="22">22</option>
              <option value="23">23</option>
            </select>
            <span>:</span>
            <select id="checkin-minute" aria-label="签到分钟">
              <option value="00">00</option>
              <option value="01">01</option>
              <option value="02">02</option>
              <option value="03">03</option>
              <option value="04">04</option>
              <option value="05">05</option>
              <option value="06">06</option>
              <option value="07">07</option>
              <option value="08">08</option>
              <option value="09">09</option>
              <option value="10">10</option>
              <option value="11">11</option>
              <option value="12">12</option>
              <option value="13">13</option>
              <option value="14">14</option>
              <option value="15">15</option>
              <option value="16">16</option>
              <option value="17">17</option>
              <option value="18">18</option>
              <option value="19">19</option>
              <option value="20">20</option>
              <option value="21">21</option>
              <option value="22">22</option>
              <option value="23">23</option>
              <option value="24">24</option>
              <option value="25">25</option>
              <option value="26">26</option>
              <option value="27">27</option>
              <option value="28">28</option>
              <option value="29">29</option>
              <option value="30">30</option>
              <option value="31">31</option>
              <option value="32">32</option>
              <option value="33">33</option>
              <option value="34">34</option>
              <option value="35">35</option>
              <option value="36">36</option>
              <option value="37">37</option>
              <option value="38">38</option>
              <option value="39">39</option>
              <option value="40">40</option>
              <option value="41">41</option>
              <option value="42">42</option>
              <option value="43">43</option>
              <option value="44">44</option>
              <option value="45">45</option>
              <option value="46">46</option>
              <option value="47">47</option>
              <option value="48">48</option>
              <option value="49">49</option>
              <option value="50">50</option>
              <option value="51">51</option>
              <option value="52">52</option>
              <option value="53">53</option>
              <option value="54">54</option>
              <option value="55">55</option>
              <option value="56">56</option>
              <option value="57">57</option>
              <option value="58">58</option>
              <option value="59">59</option>
            </select>
          </div>
          <input id="checkin-time" name="time" type="hidden" required />
          <small class="error" data-error-for="time"></small>
        </label>
        <label>课程内容
          <input id="checkin-content" name="content" maxlength="80" />
          <small class="error" data-error-for="content"></small>
        </label>

        <p id="checkin-form-server-error" class="error"></p>
        <menu>
          <button type="button" id="cancel-checkin-btn" class="secondary">取消</button>
          <button type="submit">提交签到</button>
        </menu>
      </form>
    </dialog>


    <dialog id="batch-checkin-dialog">
      <form method="dialog" id="batch-checkin-form">
        <h3>批量签到</h3>
        <input type="hidden" id="batch-weekday" name="weekday" />
        <input type="hidden" id="batch-start-time" name="start_time" />
        <input type="hidden" id="batch-end-time" name="end_time" />
        <label>上课日期
          <input id="batch-session-date" name="session_date" type="date" required />
          <small class="error" data-error-for="session_date"></small>
        </label>
        <label>课程内容（可选）
          <input id="batch-class-content" name="class_content" maxlength="80" placeholder="例如：色彩构图训练" />
        </label>

        <div class="batch-students-section">
          <p>应到学生（默认全选）</p>
          <div id="batch-student-list" class="batch-student-list"></div>
        </div>

        <p id="batch-checkin-form-server-error" class="error"></p>
        <menu>
          <button type="button" id="cancel-batch-checkin-btn" class="secondary">取消</button>
          <button type="submit">提交批量签到</button>
        </menu>
      </form>
    </dialog>


    <dialog id="renew-dialog">
      <form method="dialog" id="renew-form">
        <h3>学生续费</h3>
        <input type="hidden" id="renew-student-id" />
        <label>续费金额
          <input id="renew-amount" name="amount" type="number" min="0.01" max="9999999" step="0.01" required />
          <small class="error" data-error-for="amount"></small>
        </label>
        <label>续课次数
          <input id="renew-enroll-count" name="enroll_count" type="number" min="1" max="1000" required />
          <small class="error" data-error-for="enroll_count"></small>
        </label>

        <p id="renew-form-server-error" class="error"></p>
        <menu>
          <button type="button" id="cancel-renew-btn" class="secondary">取消</button>
          <button type="submit">确认续费</button>
        </menu>
      </form>
    </dialog>


    <dialog id="remark-dialog">
      <form method="dialog" id="remark-form">
        <h3>学生备注</h3>
        <input type="hidden" id="remark-student-id" />
        <label>备注内容
          <textarea id="remark-content" name="remark" maxlength="500" rows="8" placeholder="请输入备注内容（最多 500 字）"></textarea>
          <small class="error" data-error-for="remark"></small>
        </label>

        <p id="remark-form-server-error" class="error"></p>
        <menu>
          <button type="button" id="cancel-remark-btn" class="secondary">取消</button>
          <button type="submit">保存备注</button>
        </menu>
      </form>
    </dialog>

    <script type="module" src="./main.js"></script>
  </body>
</html>
